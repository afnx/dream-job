services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - PORT=5000
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: dream_job_db
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  node_modules:
  db_data: